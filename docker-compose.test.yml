services:
  test-unit:
    build:
      context: .
      dockerfile: Dockerfile.test
    command: uv run pytest tests/ -q --ignore=tests/docker --ignore=tests/live
    profiles: [unit]

  test-live:
    build:
      context: .
      dockerfile: Dockerfile.test
    command: uv run pytest tests/live/ --llm-live --live-network -v
    env_file:
      - path: .env
        required: true
    volumes:
      - playwright-cache:/root/.cache/ms-playwright
      - uv-tool-cache:/root/.cache/uv
    profiles: [live]

  test-functional:
    build:
      context: .
      dockerfile: Dockerfile.test
    command: uv run pytest tests/functional/ -v --functional
    environment:
      - OPENROUTER_API_KEY
      - KISO_LLM_API_KEY
    volumes:
      # Cache Playwright browser binaries and uv packages across runs.
      # First run downloads; subsequent runs use cache. The test flow
      # is identical — kiso tool install still runs fully (git clone,
      # uv sync, deps.sh) but cached downloads resolve instantly.
      - playwright-cache:/root/.cache/ms-playwright
      - uv-tool-cache:/root/.cache/uv
    profiles: [functional]

  test-docker:
    build:
      context: .
      dockerfile: Dockerfile.test
    command: uv run pytest tests/docker/ -v
    profiles: [docker]

volumes:
  playwright-cache:
  uv-tool-cache:
