services:
  test-unit:
    build:
      context: .
      dockerfile: Dockerfile.test
    command: uv run pytest tests/ -q --ignore=tests/docker --ignore=tests/live
    profiles: [unit]

  test-live:
    build:
      context: .
      dockerfile: Dockerfile.test
    command: uv run pytest tests/live/ --llm-live --live-network -v
    env_file:
      - path: .env
        required: true
    environment:
      - UV_LINK_MODE=copy
    volumes:
      - dep-cache:/root/.cache
    profiles: [live]

  test-functional:
    build:
      context: .
      dockerfile: Dockerfile.test
    command: uv run pytest tests/functional/ -v --functional -m "functional and not extended"
    environment:
      - OPENROUTER_API_KEY
      - KISO_LLM_API_KEY
      - UV_LINK_MODE=copy
    volumes:
      - dep-cache:/root/.cache
    profiles: [functional]

  test-docker:
    build:
      context: .
      dockerfile: Dockerfile.test
    command: uv run pytest tests/docker/ -v
    profiles: [docker]

  test-plugins:
    build:
      context: .
      dockerfile: Dockerfile.test
    # Default: test all plugins. Override with custom command for specific ones:
    #   docker compose -f docker-compose.test.yml run --rm test-plugins \
    #     uv run python -m cli.plugin_test_runner browser
    command: uv run python -m cli.plugin_test_runner
    environment:
      - UV_LINK_MODE=copy
    volumes:
      - dep-cache:/root/.cache
    profiles: [plugins]

volumes:
  dep-cache:
