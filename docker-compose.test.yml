services:
  test-functional:
    build:
      context: .
      dockerfile: Dockerfile.test
    command: uv run pytest tests/functional/ -v --functional -m "functional and not extended"
    environment:
      - OPENROUTER_API_KEY
      - OPENROUTER_API_KEY
      - UV_LINK_MODE=copy
    volumes:
      - dep-cache:/root/.cache
    profiles: [functional]

  test-docker:
    build:
      context: .
      dockerfile: Dockerfile.test
    command: uv run pytest tests/docker/ -v
    profiles: [docker]

volumes:
  dep-cache:
