services:
  test-unit:
    build:
      context: .
      dockerfile: Dockerfile.test
    command: uv run pytest tests/ -q --ignore=tests/docker --ignore=tests/live
    profiles: [unit]

  test-live:
    build:
      context: .
      dockerfile: Dockerfile.test
    command: uv run pytest tests/live/ --llm-live --live-network -v
    env_file:
      - path: .env
        required: true
    profiles: [live]

  test-docker:
    build:
      context: .
      dockerfile: Dockerfile.test
    command: uv run pytest tests/docker/ -v
    profiles: [docker]
