# Shared CI template for `kiso-run/*-mcp` sibling repositories.
#
# This file is the canonical shape referenced in
# `docs/standards.md`. Each sibling repo vendors its own copy
# under `.github/workflows/ci.yml`. The template is kept here
# (rather than pulled dynamically) so any change is reviewed
# in one place and copy-pasted deliberately.
#
# Assumptions:
# - The repo uses `uv` as the package manager (every kiso-run/*-mcp
#   does).
# - `uv lock` has been committed.
# - Tests live under `tests/` and run with `pytest`.
# - Linting uses `ruff`.
#
# Distribution model: the release IS the git tag. No PyPI upload.

name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Lint (ruff)
        run: uv run ruff check .

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}
      - name: Sync dependencies
        run: uv sync --all-extras
      - name: Verify uv.lock is current
        run: uv lock --check
      - name: Run tests
        run: uv run pytest -q

  release-verify:
    # On tag push, re-run tests and sanity-check the tag format.
    # No PyPI upload — consumers install via
    #   uvx --from git+https://github.com/kiso-run/<name>-mcp@<tag>
    # so the git tag itself is the release artefact.
    if: startsWith(github.ref, 'refs/tags/')
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate tag format (v<semver>)
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?$ ]]; then
            echo "Invalid tag format: '$tag' (expected 'v<major>.<minor>.<patch>')"
            exit 1
          fi
          echo "Tag $tag OK."
      - name: Confirm pyproject.toml version matches tag
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          pyproject_version="v$(grep -oP '^version\s*=\s*"\K[^"]+' pyproject.toml)"
          if [[ "$pyproject_version" != "$tag" ]]; then
            echo "pyproject.toml version ($pyproject_version) does not match tag ($tag)"
            exit 1
          fi
          echo "pyproject.toml version matches tag $tag"
